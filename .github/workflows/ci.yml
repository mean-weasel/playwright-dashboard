name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  merge_group:
  schedule:
    # Catch macOS, Xcode, SwiftPM, and Homebrew drift before the next PR.
    - cron: '23 11 * * 1'
  workflow_dispatch:
    inputs:
      gui_smoke_mode:
        description: Optional expanded-session GUI smoke to run after packaging
        type: choice
        required: true
        default: none
        options:
          - none
          - live
          - fallback
          - recording
          - multi
          - safe-observer
          - cli-multi
          - many
          - both
          - all

concurrency:
  group: ci-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PLAYWRIGHT_CLI_VERSION: 0.1.5

jobs:
  detect-changes:
    name: Detect Changed Paths
    runs-on: macos-15
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'PlaywrightDashboard/Sources/**'
              - 'PlaywrightDashboard/Tests/**'
              - 'PlaywrightDashboard/Package.swift'
              - 'Makefile'
              - 'scripts/**'
              - '.github/**'
              - '*.html'

  lint:
    name: Lint
    runs-on: macos-15
    timeout-minutes: 10
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v5
      - name: Install swift-format
        run: brew install swift-format
      - name: Lint
        run: swift-format lint --recursive PlaywrightDashboard/Sources PlaywrightDashboard/Tests

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Build (warnings as errors)
        working-directory: PlaywrightDashboard
        run: |
          swift build \
            -Xswiftc -warnings-as-errors \
            2>&1 | tee build.log
          if grep -q "error:" build.log; then exit 1; fi
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-log
          path: PlaywrightDashboard/build.log
          if-no-files-found: ignore

  unit-tests:
    name: Unit Tests
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Run tests
        working-directory: PlaywrightDashboard
        run: swift test 2>&1 | tee test.log
      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          if grep -q "Test run with .* tests" PlaywrightDashboard/test.log 2>/dev/null; then
            grep "Test run with .* tests" PlaywrightDashboard/test.log >> "$GITHUB_STEP_SUMMARY"
          elif grep -q "Test Suite.*passed" PlaywrightDashboard/test.log 2>/dev/null; then
            grep "Test Suite\|Executed\|passed\|failed" PlaywrightDashboard/test.log \
              | grep -v "Executed 0 tests" >> "$GITHUB_STEP_SUMMARY" || true
          else
            echo "_No test results found (test target may not exist yet)._" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-log
          path: PlaywrightDashboard/test.log
          if-no-files-found: ignore

  coverage:
    name: Coverage
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Run tests with coverage
        working-directory: PlaywrightDashboard
        run: |
          swift test --enable-code-coverage
          echo "CODECOV_PATH=$(swift test --show-codecov-path)" >> "$GITHUB_ENV"
      - name: Coverage summary and floor enforcement
        env:
          SOURCE_COVERAGE_FLOOR: "30"
          PER_FILE_COVERAGE_FLOOR: "10"
          PER_FILE_FLOOR_MIN_LINES: "15"
        run: |
          node <<'NODE'
          const fs = require("fs");
          const coveragePath = process.env.CODECOV_PATH;
          const coverage = JSON.parse(fs.readFileSync(coveragePath, "utf8"));
          const files = coverage.data?.flatMap((entry) => entry.files ?? []) ?? [];

          function summarize(selectedFiles) {
            const lines = selectedFiles.reduce(
              (total, file) => {
                total.count += file.summary?.lines?.count ?? 0;
                total.covered += file.summary?.lines?.covered ?? 0;
                return total;
              },
              { count: 0, covered: 0 },
            );
            const percent = lines.count === 0 ? 0 : (lines.covered / lines.count) * 100;
            return { ...lines, percent };
          }

          function relPath(file) {
            const marker = "/PlaywrightDashboard/Sources/PlaywrightDashboard/";
            const idx = file.filename.indexOf(marker);
            return idx >= 0 ? file.filename.slice(idx + marker.length) : file.filename;
          }

          function baseName(file) {
            const slash = file.filename.lastIndexOf("/");
            return slash >= 0 ? file.filename.slice(slash + 1) : file.filename;
          }

          // Smoke* files in App/ are test-only infrastructure exercised by GUI smokes,
          // not unit tests. Excluding them from the unit-test coverage aggregate avoids
          // penalizing PRs that add smoke launch args or fixtures.
          function isSmokeInfra(file) {
            return baseName(file).startsWith("Smoke");
          }

          const total = summarize(files);
          const sourceFiles = files
            .filter((file) => file.filename.includes("/PlaywrightDashboard/Sources/"))
            .filter((file) => !isSmokeInfra(file));
          const source = summarize(sourceFiles);
          const lowestSourceFiles = sourceFiles
            .map((file) => ({
              filename: relPath(file),
              percent: file.summary?.lines?.percent ?? 0,
              count: file.summary?.lines?.count ?? 0,
              covered: file.summary?.lines?.covered ?? 0,
            }))
            .filter((file) => file.count > 0)
            .sort((a, b) => a.percent - b.percent)
            .slice(0, 10);

          const sourceFloor = Number(process.env.SOURCE_COVERAGE_FLOOR ?? "0");
          const perFileFloor = Number(process.env.PER_FILE_COVERAGE_FLOOR ?? "0");
          const perFileMinLines = Number(process.env.PER_FILE_FLOOR_MIN_LINES ?? "0");
          const violations = [];

          if (sourceFloor > 0 && source.percent < sourceFloor) {
            violations.push(
              `Source coverage ${source.percent.toFixed(2)}% is below the ${sourceFloor}% floor`,
            );
          }

          const perFileEnforced = sourceFiles
            .map((file) => ({
              rel: relPath(file),
              percent: file.summary?.lines?.percent ?? 0,
              count: file.summary?.lines?.count ?? 0,
            }))
            .filter(
              (file) =>
                (file.rel.startsWith("Services/") || file.rel.startsWith("Models/")) &&
                file.count >= perFileMinLines,
            );
          if (perFileFloor > 0) {
            for (const file of perFileEnforced) {
              if (file.percent < perFileFloor) {
                violations.push(
                  `${file.rel}: ${file.percent.toFixed(2)}% is below the ${perFileFloor}% per-file floor (${file.count} lines)`,
                );
              }
            }
          }

          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              "## Coverage",
              "",
              `Total lines: ${total.covered}/${total.count} (${total.percent.toFixed(2)}%)`,
              `Source lines: ${source.covered}/${source.count} (${source.percent.toFixed(2)}%)`,
              "",
              `Source floor: ${sourceFloor}% (excludes \`Smoke*.swift\` test infrastructure) — per-file floor: ${perFileFloor}% (Services/Models, files ≥ ${perFileMinLines} lines)`,
              "",
              "### Lowest Source Files",
              "",
              "| File | Lines | Coverage |",
              "| --- | ---: | ---: |",
              ...lowestSourceFiles.map(
                (file) =>
                  `| ${file.filename} | ${file.covered}/${file.count} | ${file.percent.toFixed(2)}% |`,
              ),
              "",
              violations.length === 0
                ? "_Coverage floors satisfied._"
                : `**Coverage floor violations (${violations.length}):**\n\n${violations.map((v) => `- ${v}`).join("\n")}`,
              "",
            ].join("\n"),
          );

          if (violations.length > 0) {
            for (const msg of violations) {
              console.error(`::error::${msg}`);
            }
            process.exit(1);
          }
          NODE
      - name: Upload coverage JSON
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-dashboard-coverage
          path: ${{ env.CODECOV_PATH }}
          if-no-files-found: error

  file-size-check:
    name: File Size Check
    runs-on: macos-15
    timeout-minutes: 2
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v5
      - name: Check file sizes (max 300 lines)
        run: |
          OVERSIZED=$(find PlaywrightDashboard/Sources -name '*.swift' -exec awk 'END { if (NR > 300) print FILENAME ": " NR " lines" }' {} \;)
          if [ -n "$OVERSIZED" ]; then
            echo "::error::Swift files exceeding 300 lines:"
            echo "$OVERSIZED"
            exit 1
          fi

  mockup-check:
    name: Mockup Check
    runs-on: macos-15
    timeout-minutes: 2
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v5
      - name: Validate mockup files
        run: make mockups

  package-check:
    name: Package Check
    runs-on: macos-15
    timeout-minutes: 15
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (github.event_name != 'pull_request' ||
       needs.detect-changes.outputs.code == 'true')
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Build app bundle
        run: make validate-package
      - name: Upload app zip
        uses: actions/upload-artifact@v7.0.1
        with:
          name: PlaywrightDashboard
          path: dist/PlaywrightDashboard.zip
          if-no-files-found: error

  visual-structure-smoke:
    name: Visual Structure Smoke
    runs-on: macos-15
    timeout-minutes: 15
    needs: [package-check]
    if: >-
      always() && !cancelled() &&
      needs.package-check.result == 'success'
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Run structural UI smoke
        run: make visual-structure-smoke
      - name: Structural smoke summary
        if: always()
        run: |
          if [ -f dist/visual-structure-smoke/summary.md ]; then
            cat dist/visual-structure-smoke/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Visual Structure Smoke" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_No structural smoke manifest was produced._" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload structural smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: visual-structure-smoke
          path: |
            dist/visual-structure-smoke/**
            dist/PlaywrightDashboard.zip
          if-no-files-found: ignore

  gui-smoke-live:
    name: GUI Smoke Live
    runs-on: macos-15
    timeout-minutes: 25
    continue-on-error: ${{ github.event_name == 'schedule' }}
    needs: [package-check]
    if: >-
      always() && !cancelled() &&
      needs.package-check.result == 'success' &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' &&
        (inputs.gui_smoke_mode == 'live' ||
         inputs.gui_smoke_mode == 'both' ||
         inputs.gui_smoke_mode == 'all')))
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Check Chrome
        run: |
          if [ ! -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            echo "::error::Google Chrome is required for GUI smoke."
            exit 1
          fi
      - name: Run expanded interaction smoke
        env:
          RUN_EXPANDED_INTERACTION_SMOKE: "1"
          SMOKE_ENFORCE_SURFACE_PIXELS: "1"
          SMOKE_ENFORCE_INPUT_EVENTS: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-live-artifacts
          SMOKE_RETRY_COUNT: "1"
        run: make smoke-expanded-interaction
      - name: Upload live smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gui-smoke-live-artifacts
          path: |
            dist/gui-smoke-live-artifacts/**
            dist/PlaywrightDashboard.zip
          if-no-files-found: ignore
      - name: Upload live smoke results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: smoke-results-live
          path: dist/smoke-results.json
          if-no-files-found: ignore

  gui-smoke-fallback:
    name: GUI Smoke Fallback
    runs-on: macos-15
    timeout-minutes: 25
    continue-on-error: ${{ github.event_name == 'schedule' }}
    needs: [package-check]
    if: >-
      always() && !cancelled() &&
      needs.package-check.result == 'success' &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' &&
        (inputs.gui_smoke_mode == 'fallback' ||
         inputs.gui_smoke_mode == 'both' ||
         inputs.gui_smoke_mode == 'all')))
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Check Chrome
        run: |
          if [ ! -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            echo "::error::Google Chrome is required for GUI smoke."
            exit 1
          fi
      - name: Run expanded fallback smoke
        env:
          RUN_EXPANDED_FALLBACK_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-fallback-artifacts
          SMOKE_RETRY_COUNT: "1"
        run: make smoke-expanded-fallback
      - name: Upload fallback smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gui-smoke-fallback-artifacts
          path: |
            dist/gui-smoke-fallback-artifacts/**
            dist/PlaywrightDashboard.zip
          if-no-files-found: ignore
      - name: Upload fallback smoke results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: smoke-results-fallback
          path: dist/smoke-results.json
          if-no-files-found: ignore

  gui-smoke-recording:
    name: GUI Smoke Recording Export
    runs-on: macos-15
    timeout-minutes: 20
    continue-on-error: ${{ github.event_name == 'schedule' }}
    needs: [package-check]
    if: >-
      always() && !cancelled() &&
      needs.package-check.result == 'success' &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' &&
        (inputs.gui_smoke_mode == 'recording' || inputs.gui_smoke_mode == 'all')))
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Check Chrome
        run: |
          if [ ! -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            echo "::error::Google Chrome is required for recording export smoke."
            exit 1
          fi
      - name: Run recording export smoke
        env:
          RUN_RECORDING_EXPORT_SMOKE: "1"
          SMOKE_RETRY_COUNT: "1"
        run: make smoke-recording-export
      - name: Collect recording export artifacts
        if: always()
        run: |
          mkdir -p dist/gui-smoke-recording-artifacts
          if [ -d "$HOME/Downloads/PlaywrightDashboard Recordings" ]; then
            cp -R "$HOME/Downloads/PlaywrightDashboard Recordings" \
              dist/gui-smoke-recording-artifacts/recordings
          fi
      - name: Upload recording smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gui-smoke-recording-artifacts
          path: |
            dist/gui-smoke-recording-artifacts/**
            dist/PlaywrightDashboard.zip
          if-no-files-found: ignore
      - name: Upload recording smoke results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: smoke-results-recording
          path: dist/smoke-results.json
          if-no-files-found: ignore

  gui-smoke-multi-session:
    name: GUI Smoke Multi Session
    runs-on: macos-15
    timeout-minutes: 30
    continue-on-error: ${{ github.event_name == 'schedule' }}
    needs: [package-check]
    if: >-
      always() && !cancelled() &&
      needs.package-check.result == 'success' &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' &&
        (inputs.gui_smoke_mode == 'multi' || inputs.gui_smoke_mode == 'all')))
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Check Chrome
        run: |
          if [ ! -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            echo "::error::Google Chrome is required for multi-session GUI smoke."
            exit 1
          fi
      - name: Run multi-session smoke
        env:
          RUN_MULTI_SESSION_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-multi-session-artifacts
          SMOKE_RETRY_COUNT: "1"
        run: make smoke-multi-session
      - name: Upload multi-session smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gui-smoke-multi-session-artifacts
          path: |
            dist/gui-smoke-multi-session-artifacts/**
            dist/PlaywrightDashboard.zip
          if-no-files-found: ignore
      - name: Upload multi-session smoke results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: smoke-results-multi-session
          path: dist/smoke-results.json
          if-no-files-found: ignore

  gui-smoke-safe-mode-observer:
    name: GUI Smoke Safe Mode Observer
    runs-on: macos-15
    timeout-minutes: 30
    needs: [package-check]
    if: >-
      always() && !cancelled() &&
      needs.package-check.result == 'success' &&
      (github.event_name == 'pull_request' ||
       github.event_name == 'push' ||
       github.event_name == 'merge_group' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Check Chrome
        run: |
          if [ ! -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            echo "::error::Google Chrome is required for Safe-mode observer GUI smoke."
            exit 1
          fi
      - name: Run Safe-mode observer smoke
        env:
          RUN_SAFE_MODE_OBSERVER_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-safe-mode-observer-artifacts
          SMOKE_RETRY_COUNT: "1"
        run: make smoke-safe-mode-observer
      - name: Upload Safe-mode observer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gui-smoke-safe-mode-observer-artifacts
          path: |
            dist/gui-smoke-safe-mode-observer-artifacts/**
            dist/PlaywrightDashboard.zip
          if-no-files-found: ignore
      - name: Upload Safe-mode observer smoke results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: smoke-results-safe-mode-observer
          path: dist/smoke-results.json
          if-no-files-found: ignore

  gui-smoke-playwright-cli-multi-session:
    name: GUI Smoke Playwright CLI Multi Session
    runs-on: macos-15
    timeout-minutes: 30
    needs: [package-check]
    if: >-
      always() && !cancelled() &&
      needs.package-check.result == 'success' &&
      (github.event_name == 'pull_request' ||
       github.event_name == 'push' ||
       github.event_name == 'merge_group' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Install Playwright CLI
        run: npm install -g "@playwright/cli@${PLAYWRIGHT_CLI_VERSION}"
      - name: Check Chrome
        run: |
          if [ ! -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            echo "::error::Google Chrome is required for real Playwright CLI multi-session smoke."
            exit 1
          fi
      - name: Check Playwright CLI
        run: |
          if ! command -v playwright-cli >/dev/null 2>&1; then
            echo "::error::playwright-cli is required for real Playwright CLI multi-session smoke."
            exit 1
          fi
      - name: Run Playwright CLI multi-session smoke
        env:
          RUN_PLAYWRIGHT_CLI_MULTI_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-playwright-cli-multi-session-artifacts
          SMOKE_RETRY_COUNT: "1"
        run: make smoke-playwright-cli-multi-session
      - name: Upload Playwright CLI multi-session smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gui-smoke-playwright-cli-multi-session-artifacts
          path: |
            dist/gui-smoke-playwright-cli-multi-session-artifacts/**
            dist/PlaywrightDashboard.zip
          if-no-files-found: ignore
      - name: Upload Playwright CLI multi-session smoke results
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: smoke-results-playwright-cli-multi-session
          path: dist/smoke-results.json
          if-no-files-found: ignore

  gui-smoke-playwright-cli-dashboard-actions:
    name: GUI Smoke Playwright CLI Dashboard Actions
    runs-on: macos-15
    timeout-minutes: 30
    needs: [package-check]
    if: >-
      always() && !cancelled() &&
      needs.package-check.result == 'success' &&
      (github.event_name == 'pull_request' ||
       github.event_name == 'push' ||
       github.event_name == 'merge_group' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
      - name: Install Playwright CLI
