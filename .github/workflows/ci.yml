  ci-gate:
    name: CI Gate
    runs-on: macos-15
    timeout-minutes: 5
    if: always()
    needs:
      - detect-changes
      - lint
      - build
      - unit-tests
      - coverage
      - file-size-check
      - mockup-check
      - package-check
      - visual-structure-smoke
      - gui-smoke-safe-mode-observer
      - gui-smoke-playwright-cli-multi-session
      - gui-smoke-playwright-cli-dashboard-actions
      - gui-smoke-playwright-cli-multi-target
      - gui-smoke-playwright-cli-recording
      - gui-smoke-playwright-cli-interaction
      - gui-smoke-reliability
    steps:
      - uses: actions/checkout@v5
      - name: Check required jobs
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_RESULT: ${{ needs.unit-tests.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          SIZE_RESULT: ${{ needs.file-size-check.result }}
          MOCKUP_RESULT: ${{ needs.mockup-check.result }}
          PACKAGE_RESULT: ${{ needs.package-check.result }}
          STRUCTURE_RESULT: ${{ needs.visual-structure-smoke.result }}
          SAFE_OBSERVER_RESULT: ${{ needs.gui-smoke-safe-mode-observer.result }}
          CLI_MULTI_RESULT: ${{ needs.gui-smoke-playwright-cli-multi-session.result }}
          CLI_ACTIONS_RESULT: ${{ needs.gui-smoke-playwright-cli-dashboard-actions.result }}
          CLI_TARGETS_RESULT: ${{ needs.gui-smoke-playwright-cli-multi-target.result }}
          CLI_RECORDING_RESULT: ${{ needs.gui-smoke-playwright-cli-recording.result }}
          CLI_INTERACTION_RESULT: ${{ needs.gui-smoke-playwright-cli-interaction.result }}
          RELIABILITY_RESULT: ${{ needs.gui-smoke-reliability.result }}
          EVENT_NAME: ${{ github.event_name }}
          CODE_CHANGED: ${{ needs.detect-changes.outputs.code }}
        run: |
          echo "Lint: $LINT_RESULT, Build: $BUILD_RESULT, Tests: $TEST_RESULT, Coverage: $COVERAGE_RESULT, Size: $SIZE_RESULT, Mockups: $MOCKUP_RESULT, Package: $PACKAGE_RESULT, Structure: $STRUCTURE_RESULT, Safe observer: $SAFE_OBSERVER_RESULT, CLI multi: $CLI_MULTI_RESULT, CLI actions: $CLI_ACTIONS_RESULT, CLI targets: $CLI_TARGETS_RESULT, CLI recording: $CLI_RECORDING_RESULT, CLI interaction: $CLI_INTERACTION_RESULT, Reliability: $RELIABILITY_RESULT"
          allow_skipped=false
          if [ "$EVENT_NAME" = "pull_request" ] && [ "$CODE_CHANGED" != "true" ]; then
            allow_skipped=true
            echo "Docs-only PR detected; skipped required jobs are allowed."
          fi
          for result in "$LINT_RESULT" "$BUILD_RESULT" "$TEST_RESULT" "$COVERAGE_RESULT" "$SIZE_RESULT" "$MOCKUP_RESULT" "$PACKAGE_RESULT" "$STRUCTURE_RESULT" "$SAFE_OBSERVER_RESULT" "$CLI_MULTI_RESULT" "$CLI_ACTIONS_RESULT" "$CLI_TARGETS_RESULT" "$CLI_RECORDING_RESULT" "$CLI_INTERACTION_RESULT" "$RELIABILITY_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "A required job reported: $result"
              exit 1
            fi
            if [ "$result" = "skipped" ] && [ "$allow_skipped" != "true" ]; then
              echo "A required job was unexpectedly skipped"
              exit 1
            fi
          done
          echo "All required jobs passed"
      - name: smoke-all parity preview (non-blocking)
        continue-on-error: true
        run: |
          {
            echo "## smoke-all Parity"
            echo ""
            echo "Surface invoked by \`make smoke-all\` (compare against the required-job set above):"
            echo ""
            echo '```'
            SMOKE_ALL_DRY_RUN=1 make smoke-all
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Download smoke results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p smoke-results
          artifact_names="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" --paginate --jq '.artifacts[].name | select(startswith("smoke-results-"))')"
          if [ -z "$artifact_names" ]; then
            echo "No smoke result artifacts found."
            exit 0
          fi
          while IFS= read -r artifact_name; do
            [ -n "$artifact_name" ] || continue
            echo "Downloading $artifact_name"
            gh run download "$GITHUB_RUN_ID" --name "$artifact_name" --dir "smoke-results/$artifact_name"
          done <<< "$artifact_names"
      - name: Smoke flake + retry summary
        if: always()
        continue-on-error: true
        run: node scripts/summarize_smoke_results.mjs smoke-results
