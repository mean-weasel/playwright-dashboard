name: GUI Smoke

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Smoke mode to run
        type: choice
        required: true
        default: live
        options:
          - live
          - fallback
          - recording
          - multi
          - safe-observer
          - cli-multi
          - realistic
          - both
          - all

concurrency:
  group: gui-smoke-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PLAYWRIGHT_CLI_VERSION: 0.1.5

jobs:
  expanded-interaction:
    name: Expanded Interaction Smoke
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Check Chrome
        run: |
          if [ ! -x "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            echo "::error::Google Chrome is required for the GUI smoke workflow."
            exit 1
          fi

      - name: Install Playwright CLI
        if: inputs.mode == 'cli-multi' || inputs.mode == 'realistic' || inputs.mode == 'all'
        run: npm install -g "@playwright/cli@${PLAYWRIGHT_CLI_VERSION}"

      - name: Run expanded interaction smoke
        env:
          RUN_EXPANDED_INTERACTION_SMOKE: "1"
          SMOKE_ENFORCE_SURFACE_PIXELS: "1"
          SMOKE_ENFORCE_INPUT_EVENTS: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-artifacts
        if: inputs.mode == 'live' || inputs.mode == 'both' || inputs.mode == 'all'
        run: make smoke-expanded-interaction

      - name: Run expanded fallback smoke
        env:
          RUN_EXPANDED_FALLBACK_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-artifacts
        if: inputs.mode == 'fallback' || inputs.mode == 'both' || inputs.mode == 'all'
        run: make smoke-expanded-fallback

      - name: Run recording export smoke
        env:
          RUN_RECORDING_EXPORT_SMOKE: "1"
        if: inputs.mode == 'recording' || inputs.mode == 'all'
        run: make smoke-recording-export

      - name: Run multi-session smoke
        env:
          RUN_MULTI_SESSION_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-artifacts
        if: inputs.mode == 'multi' || inputs.mode == 'all'
        run: make smoke-multi-session

      - name: Run Safe-mode observer smoke
        env:
          RUN_SAFE_MODE_OBSERVER_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-artifacts
        if: inputs.mode == 'safe-observer' || inputs.mode == 'all'
        run: make smoke-safe-mode-observer

      - name: Run Playwright CLI multi-session smoke
        env:
          RUN_PLAYWRIGHT_CLI_MULTI_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/gui-smoke-artifacts
        if: inputs.mode == 'cli-multi' || inputs.mode == 'all'
        run: make smoke-playwright-cli-multi-session

      - name: Run realistic E2E demo smoke
        env:
          RUN_REALISTIC_E2E_SMOKE: "1"
          SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/dist/realistic-e2e-artifacts
        if: inputs.mode == 'realistic' || inputs.mode == 'all'
        run: make smoke-realistic-e2e

      - name: Collect realistic demo media
        env:
          DEMO_MEDIA_FROM_EXISTING: "1"
          REALISTIC_E2E_ARTIFACT_DIR: ${{ github.workspace }}/dist/realistic-e2e-artifacts
          DEMO_MEDIA_DIR: ${{ github.workspace }}/dist/docs-media/operator-workbench
        if: inputs.mode == 'realistic' || inputs.mode == 'all'
        run: make demo-media

      - name: Collect recording export artifacts
        if: always()
        run: |
          mkdir -p dist/gui-smoke-artifacts
          if [ -d "$HOME/Downloads/PlaywrightDashboard Recordings" ]; then
            cp -R "$HOME/Downloads/PlaywrightDashboard Recordings" \
              dist/gui-smoke-artifacts/recordings
          fi

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gui-smoke-artifacts
          path: |
            dist/gui-smoke-artifacts/**
            dist/realistic-e2e-artifacts/**
            dist/docs-media/operator-workbench/**
            dist/PlaywrightDashboard.zip
          if-no-files-found: ignore
